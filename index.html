<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order summary card</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="main-back">
            <div class="sec-layer">
                <div class="container">
                    <div>
                        <img class="hero" src="images/illustration-hero.svg" alt="girl dancing">
                    </div>
                    <h1>Order Summary</h1>
                    <p class="ptag">You can now listen to millions of songs, audiobooks, and podcasts on any 
                        device anywhere you like!</p>
                    <div class="items">
                        <div class="item1"><img src="images/icon-music.svg" alt="music icon"></div>
                        <div class="item2">annual plan</div>
                        <div class="item3"><a href="#">change</a></div>
                        <div class="item4"><p>$59.99/year</p></div>
                    </div>
                    <button>Proceed to Payment</button>
                    <a class="lastitem" href="#">Cancel Order</a>
                </div>
            </div>
    </div>
    
</body>
</html>
